<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QUEEN STORE - OTW FAMES!</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink-card: rgba(95, 18, 58, 0.58);
      --pink-card-strong: rgba(175, 45, 115, 0.72);
      --pink-soft: rgba(255, 170, 210, 0.30);
      --pink-header: rgba(75, 12, 45, 0.44);
      --white: #ffffff;
      --shadow-card: 0 12px 46px rgba(0, 0, 0, 0.35);
      --radius-card: 22px;
      --radius-btn: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: url('https://roxy-upload.nyzz.my.id/wus0ea') center center / cover no-repeat fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-family: 'DM Sans', sans-serif;
      padding: 34px 20px 60px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.50);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* === HEADER === */
    .header {
      text-align: center;
      animation: fadeDown 0.7s ease both;
    }

    .header-badge {
      display: inline-block;
      background: rgba(255, 105, 180, 0.22);
      color: rgba(255,255,255,0.86);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 16px;
      border-radius: 100px;
      margin-bottom: 10px;
      border: 1px solid var(--pink-soft);
      backdrop-filter: blur(12px);
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 6vw, 38px);
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 2px 16px rgba(0,0,0,0.5);
      line-height: 1.1;
      letter-spacing: -0.5px;
    }

    .header h1 span {
      color: rgba(255, 220, 238, 0.96);
    }

    .header-line {
      width: 60px;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg, #ff7ebc, #ffd1e6);
      margin: 14px auto 0;
    }
    .content-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: fadeUp 0.35s ease both;
    }
/* === QR CARD === */
    .qr-wrap {
      width: 100%;
      animation: fadeUp 0.7s 0.1s ease both;
    }

    .qr-card, .payment-card, .fee-card {
      width: 100%;
      background: var(--pink-card);
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
      border: 1.5px solid var(--pink-soft);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      animation: fadeUp 0.7s ease both;
    }

    .qr-card {
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      position: relative;
    }
    .qr-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .qr-image-row {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: center;
    }

    .qr-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      overflow: hidden;
      border: none;
      outline: none;
      box-shadow: none;
      background: transparent;
    }

    .qr-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border: 0;
      outline: 0;
    }

    .qr-label {
      font-size: 13px;
      color: rgba(255,255,255,0.84);
      font-weight: 600;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.3);
    }

    /* === BUTTONS SAME AS CARD === */
    .btn-download, .btn-copy {
      background: var(--pink-card);
      color: var(--white);
      border: 1.5px solid var(--pink-soft);
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
      box-shadow: var(--shadow-card);
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s, background 0.18s;
      font-family: 'DM Sans', sans-serif;
      position: relative;
      overflow: hidden;
    }

    .btn-download {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 700;
      padding: 16px 28px;
      border-radius: var(--radius-btn);
      text-decoration: none;
      letter-spacing: 0.3px;
      animation: fadeUp 0.7s 0.2s ease both;
    }

    .btn-download::after, .btn-copy::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
      border-radius: inherit;
      pointer-events: none;
    }

    .btn-download:hover, .btn-copy:hover {
      transform: translateY(-2px);
      background: var(--pink-card-strong);
      box-shadow: 0 10px 42px rgba(255, 105, 180, 0.28);
    }

    .btn-download:active, .btn-copy:active { transform: translateY(0); opacity: 0.9; }
    .btn-download svg, .btn-copy svg { flex-shrink: 0; position: relative; z-index: 1; }
    .btn-download span, .btn-copy span { position: relative; z-index: 1; }

    /* === PAYMENT CARD === */
    .card-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      background: var(--pink-header);
    }

    .card-logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-img-box {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      overflow: hidden;
      border: none;
      outline: none;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-img-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border: 0;
      outline: 0;
    }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 1px 6px rgba(0,0,0,0.3);
    }

    .card-body {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .card-info { flex: 1; min-width: 0; }

    .card-number {
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    .card-an {
      font-size: 12px;
      color: rgba(255,255,255,0.64);
      margin-top: 2px;
      font-weight: 500;
    }

    .btn-copy {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      border-radius: 9px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .btn-copy.copied {
      background: rgba(255, 105, 180, 0.70);
      color: #ffffff;
      border-color: rgba(255,255,255,0.2);
    }

    /* === FOOTER === */
    .footer {
      text-align: center;
      font-size: 11.5px;
      color: rgba(255,255,255,0.44);
      animation: fadeUp 0.7s 0.5s ease both;
      letter-spacing: 0.3px;
    }


    .mc-warning {
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.88);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.55;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      text-shadow: 0 2px 12px rgba(0,0,0,0.50);
      margin-top: -10px;
      animation: fadeUp 0.7s 0.58s ease both;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="header-badge">Pembayaran</div>
      <h1>QUEEN STORE<br><span>Payment</span></h1>
      <div class="header-line"></div>
    </div>

    <!-- PAYMENT CONTENT -->
    <section class="content-section">
      <!-- QR Image -->
      <div class="qr-wrap">
        <div class="qr-card">
          <div class="qr-inner">
            <div class="qr-image-row">
              <div class="qr-image">
                <img src="https://roxy-upload.nyzz.my.id/mezu8w" alt="QRIS kiri" />
              </div>
              <div class="qr-image">
                <img src="https://roxy-upload.nyzz.my.id/it8tpy" alt="QRIS kanan" />
              </div>
            </div>
            <div class="qr-label">Scan untuk membayar</div>
          </div>
        </div>
      </div>

      <!-- Download QRIS Button -->
      <button class="btn-download" onclick="downloadQRIS()">
        <svg id="dl-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span id="dl-text">Unduh QRIS</span>
      </button>

      <!-- DANA Card -->
      <div class="payment-card">
        <div class="card-header">
          <div class="card-logo-wrap">
            <div class="logo-img-box">
              <img src="https://roxy-upload.nyzz.my.id/pyn4st" alt="DANA" />
            </div>
          </div>
          <div class="card-name">DANA</div>
        </div>
        <div class="card-body">
          <div class="card-info">
            <div class="card-number" id="dana-number">0853 6352 7586</div>
            <div class="card-an">A/N : IRVXXX ARXXXXX</div>
          </div>
          <button class="btn-copy" onclick="copyText('dana-number', this)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            <span>Salin</span>
          </button>
        </div>
      </div>
    </section>
<!-- Footer -->
    <div class="footer">
      © 2026 QUEEN STORE - OTW FAMES! · Secure Payment
    </div>

    <div class="mc-warning">
      TETAP MENGUNAKAN JASA MC<br>
      AGAR TERHINDAR DARI PENIPUAN
    </div>


  </div>

  <script>
    const QRIS_URL = 'https://roxy-upload.nyzz.my.id/it8tpy';
    async function downloadQRIS() {
      const btn = document.querySelector('.btn-download');
      const icon = document.getElementById('dl-icon');
      const text = document.getElementById('dl-text');

      text.textContent = 'Mengunduh...';
      icon.innerHTML = `<circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2.2" fill="none" stroke-dasharray="31.4" stroke-dashoffset="10" style="animation:spin 0.8s linear infinite;transform-origin:center"/>`;
      btn.style.pointerEvents = 'none';

      await new Promise(r => setTimeout(r, 900));

      try {
        const res = await fetch(QRIS_URL);
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'QRIS-QueenStore.jpg';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);

        text.textContent = 'Berhasil!';
        icon.innerHTML = `<polyline points="20 6 9 17 4 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
      } catch (e) {
        text.textContent = 'Gagal, coba lagi';
        icon.innerHTML = `<line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>`;
      }

      setTimeout(() => {
        text.textContent = 'Unduh QRIS';
        icon.innerHTML = `<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>`;
        btn.style.pointerEvents = '';
      }, 2500);
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.innerHTML;
        btn.innerHTML = `
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span>Disalin!</span>`;
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerHTML = orig;
          btn.classList.remove('copied');
        }, 2000);
      });
    }
  </script>
</body>
</html>
